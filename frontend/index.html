<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mosquit — аренда авто в Москве</title>

  <link rel="stylesheet" href="/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">
  <div class="container flex-between">

    <a href="/" class="logo">
      <span class="logo_text">Mosquit</span>
    </a>

    <nav class="nav">
      <a href="/catalog.html">Каталог</a>
      <a href="#how">Как это работает</a>
      <a href="#contacts">Контакты</a>
    </nav>

    <button onclick="location.href='/catalog.html'">
      Арендовать
    </button>

  </div>
</header>

<section class="hero">
  <div class="container hero_content">

    <div class="hero_text">
      <h1>Аренда автомобилей в Москве</h1>
      <p>Без залога. Быстро. Надёжно.</p>

      <button onclick="location.href='/catalog.html'">
        Выбрать авто →
      </button>
    </div>

    <div class="hero_visual">
      <div class="hero_car">
        <svg viewBox="0 0 280 120" class="hero_svg">
          <rect x="20" y="40" width="200" height="50" rx="20" fill="#4A6741"/>
          <circle cx="70" cy="95" r="12" fill="#1F2937"/>
          <circle cx="180" cy="95" r="12" fill="#1F2937"/>
        </svg>
      </div>
    </div>

  </div>
</section>

<section class="features">
  <div class="container grid grid-3">

    <div class="card">
      <img src="/assets/icons/shield.svg" class="icon">
      <h3>Без залога</h3>
    </div>

    <div class="card">
      <img src="/assets/icons/support.svg" class="icon">
      <h3>24/7 поддержка</h3>
    </div>

    <div class="card">
      <img src="/assets/icons/delivery.svg" class="icon">
      <h3>Доставка по Москве</h3>
    </div>

  </div>
</section>

<section class="popular">
  <div class="container">

    <h2>Популярные авто</h2>
    <div id="popular-cars" class="cars"></div>

  </div>
</section>

<footer class="footer">
  <div class="container">
    <p>© Mosquit</p>
  </div>
</footer>

<script src="/js/app.js"></script>
<script src="/js/api.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const cars = await api.get("/api/cars?limit=4");
  const el = document.getElementById("popular-cars");

  el.innerHTML = cars.map(c => `
    <div class="card">
      <img src="${c.image || '/assets/car-placeholder.png'}">
      <h3>${c.brand} ${c.model}</h3>
      <p>${c.price_1day} ₽</p>
    </div>
  `).join("");
});
</script>

</body>
</html>
