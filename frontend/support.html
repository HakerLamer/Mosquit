<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Техподдержка — Mosquit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml" />
</head>
<body class="admin-body">
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="admin-sidebar__brand">
      <svg viewBox="0 0 40 40" fill="none" class="admin-sidebar__logo">
        <circle cx="20" cy="20" r="20" fill="var(--primary)"/>
        <path d="M8 26l4-8h16l4 8H8z" fill="white" opacity="0.9"/>
        <circle cx="14" cy="27" r="3" fill="white"/>
        <circle cx="26" cy="27" r="3" fill="white"/>
      </svg>
      <span>Поддержка</span>
    </div>
    <nav class="admin-nav">
      <a href="#" class="admin-nav__item active" data-section="chat">
        <svg viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
        Чаты <span class="admin-nav__badge" id="chatBadge"></span>
      </a>
    </nav>
    <div class="admin-sidebar__footer">
      <a href="/" class="admin-nav__item">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke="currentColor" stroke-width="2"/><polyline points="9 22 9 12 15 12 15 22" stroke="currentColor" stroke-width="2"/></svg>
        На сайт
      </a>
      <button class="admin-nav__item" id="adminLogout">
        <svg viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Выйти
      </button>
    </div>
  </aside>
 
  <div class="admin-content">
    <div class="admin-topbar">
      <button class="admin-topbar__menu" id="sidebarToggle">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <h1 class="admin-topbar__title">Техподдержка</h1>
      <div class="admin-topbar__user" id="adminUser"></div>
    </div>
 
    <section class="admin-section" id="section-chat">
      <div class="support-layout">
        <div class="support-sessions" id="supportSessions">
          <div class="support-sessions__header">
            <h3>Активные чаты</h3>
            <select class="form__input form__input--sm" id="sessionStatusFilter">
              <option value="open">Открытые</option>
              <option value="answered">Отвечено</option>
              <option value="">Все</option>
            </select>
          </div>
          <div id="sessionsList"></div>
        </div>
        <div class="support-chat-area" id="supportChatArea">
          <div class="support-chat__empty">
            <svg viewBox="0 0 80 80" fill="none"><path d="M60 15H20a5 5 0 00-5 5v25a5 5 0 005 5h10l10 10 10-10h10a5 5 0 005-5V20a5 5 0 00-5-5z" stroke="var(--secondary)" stroke-width="2" opacity="0.4"/></svg>
            <p>Выберите чат из списка</p>
          </div>
        </div>
      </div>
    </section>
  </div>
 
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/support.js"></script>
</body>
</html>
